apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: furniture-dev
  labels:
    app: order-service
    version: v1.1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
        version: v1.1
    spec:
      containers:
        - name: order-service
          image: dockerregistrydevenv.azurecr.io/order-service:BUILD_ID
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: "Development"
            - name: SqlConnectionString
              valueFrom:
                secretKeyRef:
                  name: order-service-secrets
                  key: SqlConnectionString
            - name: ServiceBusConnectionString
              valueFrom:
                secretKeyRef:
                  name: order-service-secrets
                  key: ServiceBusConnectionString
            - name: ApplicationInsights__ConnectionString
              valueFrom:
                secretKeyRef:
                  name: order-service-secrets
                  key: ApplicationInsightsConnectionString
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /api/orders
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/orders
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
