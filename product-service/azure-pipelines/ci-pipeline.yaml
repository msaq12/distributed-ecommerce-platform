trigger:
  branches:
    include:
      - main
      - develop

pool:
  vmImage: "ubuntu-latest"

variables:
  - group: GitHub-Sync-Secrets
  - name: GITHUB_REPO
    value: "msaq12/distributed-ecommerce-platform"
  - name: SERVICE_FOLDER
    value: "product-service"
  - name: buildConfiguration
    value: "Release"
  - name: dotnetVersion
    value: "10.x"
  - name: projectPath
    value: "ProductService.Api/ProductService.Api.csproj"
  - name: artifactName
    value: "product-service"

stages:
  - stage: Build
    displayName: "Build Product Service"
    jobs:
      - job: BuildJob
        displayName: "Build and Publish"
        steps:
          # Install .NET SDK
          - task: UseDotNet@2
            displayName: "Install .NET $(dotnetVersion)"
            inputs:
              version: "$(dotnetVersion)"
              packageType: "sdk"

          # Restore dependencies
          - task: DotNetCoreCLI@2
            displayName: "Restore NuGet packages"
            inputs:
              command: "restore"
              projects: "$(projectPath)"

          # Build project
          - task: DotNetCoreCLI@2
            displayName: "Build project"
            inputs:
              command: "build"
              projects: "$(projectPath)"
              arguments: "--configuration $(buildConfiguration) --no-restore"

          # Publish compiled output
          - task: DotNetCoreCLI@2
            displayName: "Publish application"
            inputs:
              command: "publish"
              publishWebProjects: false
              projects: "$(projectPath)"
              arguments: "--configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory)/publish --no-build"
              zipAfterPublish: true
              modifyOutputPath: false

          # Publish artifact for deployment
          - task: PublishBuildArtifacts@1
            displayName: "Publish artifact"
            inputs:
              PathtoPublish: "$(Build.ArtifactStagingDirectory)/publish"
              ArtifactName: "$(artifactName)"
              publishLocation: "Container"

          # Sync to GitHub
          - script: |
              git config --global user.email "pipeline@devops.com"
              git config --global user.name "Azure DevOps Pipeline"

              git clone https://$(GITHUB_PAT)@github.com/$(GITHUB_REPO).git github-combined
              cd github-combined

              rm -rf $(SERVICE_FOLDER)
              mkdir $(SERVICE_FOLDER)

              rsync -av --exclude='.git' \
                        --exclude='github-combined' \
                        --exclude='**/bin' \
                        --exclude='**/obj' \
                        --exclude='**/publish' \
                        --exclude='**/deploy.zip' \
                        --exclude='**/coveragereport' \
                        --exclude='**/appsettings.json' \
                        $(Build.SourcesDirectory)/ $(SERVICE_FOLDER)/

              git add .
              git diff --cached --quiet || (git commit -m "Sync $(SERVICE_FOLDER) from Azure DevOps - Build $(Build.BuildNumber)" && git push)
            displayName: "Sync to GitHub combined repo"
            env:
              GITHUB_PAT: $(GITHUB_PAT)
