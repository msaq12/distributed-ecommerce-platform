trigger:
  branches:
    include:
      - main
      - develop

pool:
  vmImage: "ubuntu-latest"

variables:
  - group: GitHub-Sync-Secrets
  - name: dockerfilePath
    value: "OrderService.Api/Dockerfile"
  - name: imageName
    value: "order-service"
  - name: containerRegistry
    value: "DockerRegistryDevEnv.azurecr.io"
  - name: azureSubscription
    value: "ACR-FurnitureDropship"
  - name: imageTag
    value: "$(Build.BuildId)"

stages:
  - stage: Build
    displayName: "Build and Push Docker Image"
    jobs:
      - job: Docker
        displayName: "Docker Build and Push"
        steps:
          # Docker build and push to ACR
          - task: Docker@2
            displayName: "Build Docker image"
            inputs:
              command: "build"
              repository: "$(imageName)"
              dockerfile: "$(dockerfilePath)"
              buildContext: "$(Build.SourcesDirectory)"
              containerRegistry: "$(azureSubscription)"
              tags: |
                $(imageTag)
                latest

          - task: Docker@2
            displayName: "Push to ACR"
            inputs:
              command: "push"
              repository: "$(imageName)"
              containerRegistry: "$(azureSubscription)"
              tags: |
                $(imageTag)
                latest

          # Publish Kubernetes manifests
          - task: PublishBuildArtifacts@1
            displayName: "Publish K8s manifests"
            inputs:
              PathtoPublish: "$(Build.SourcesDirectory)/kubernetes"
              ArtifactName: "kubernetes-manifests"
              publishLocation: "Container"

          # Sync source code to GitHub combined repo
          - script: |
              git config --global user.email "pipeline@devops.com"
              git config --global user.name "Azure DevOps Pipeline"

              git clone https://$(GITHUB_PAT)@github.com/msaq12/distributed-ecommerce-platform.git github-combined
              cd github-combined

              rm -rf order-service
              mkdir order-service

              rsync -av --exclude='.git' $(Build.SourcesDirectory)/ order-service/

              git add .
              git diff --cached --quiet || (git commit -m "Sync order-service from Azure DevOps - Build $(Build.BuildNumber)" && git push)
            displayName: "Sync to GitHub combined repo"
            env:
              GITHUB_PAT: $(GITHUB_PAT)
