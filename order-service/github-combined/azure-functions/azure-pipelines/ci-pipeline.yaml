trigger:
  branches:
    include:
      - main
      - develop

pool:
  vmImage: "ubuntu-latest"

variables:
  nodeVersion: "20.x"
  artifactName: "ecommerce-site"

stages:
  - stage: Build
    displayName: "Build E-commerce Site"
    jobs:
      - job: BuildJob
        displayName: "Build Next.js App"
        steps:
          # Install Node.js
          - task: NodeTool@0
            displayName: "Install Node.js $(nodeVersion)"
            inputs:
              versionSpec: "$(nodeVersion)"

          # Create .env.production file BEFORE npm ci
          - script: |
              echo "NEXT_PUBLIC_PRODUCT_API_URL=$(NEXT_PUBLIC_PRODUCT_API_URL)" > .env.production
              echo "NEXT_PUBLIC_ORDER_API_URL=$(NEXT_PUBLIC_ORDER_API_URL)" >> .env.production
              echo "NEXT_PUBLIC_APIM_KEY=$(NEXT_PUBLIC_APIM_KEY)" >> .env.production
              echo "NEXT_PUBLIC_TENANT_ID=$(NEXT_PUBLIC_TENANT_ID)" >> .env.production
              echo "NEXT_PUBLIC_CLIENT_ID=$(NEXT_PUBLIC_CLIENT_ID)" >> .env.production
              echo "NEXT_PUBLIC_REDIRECT_URI=$(NEXT_PUBLIC_REDIRECT_URI)" >> .env.production
            displayName: "Create .env.production"
            workingDirectory: "$(Build.SourcesDirectory)"

          # Install dependencies
          - script: npm ci
            displayName: "Install dependencies"
            workingDirectory: "$(Build.SourcesDirectory)"

          # Build application
          - script: npm run build
            displayName: "Build Next.js app"
            workingDirectory: "$(Build.SourcesDirectory)"

          # Prepare standalone package
          - script: |
              mkdir deploy
              cp -r .next/standalone/. deploy/
              cp -r .next/static deploy/.next/static
              cp -r public deploy/public
            displayName: "Prepare Standalone Package"
            workingDirectory: "$(Build.SourcesDirectory)"

          # Create zip
          - task: ArchiveFiles@2
            displayName: "Create app.zip"
            inputs:
              rootFolderOrFile: "$(Build.SourcesDirectory)/deploy"
              includeRootFolder: false
              archiveType: "zip"
              archiveFile: "$(Build.ArtifactStagingDirectory)/app.zip"
              replaceExistingArchive: true

          # Publish artifact
          - task: PublishBuildArtifacts@1
            displayName: "Publish artifact"
            inputs:
              PathtoPublish: "$(Build.ArtifactStagingDirectory)/app.zip"
              ArtifactName: "$(artifactName)"
              publishLocation: "Container"
